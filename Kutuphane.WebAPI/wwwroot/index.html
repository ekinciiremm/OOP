<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kütüphane Zekâsı — Giriş</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: { colors: { indigo: { 600: '#4648d4' } } } }
  }
</script>
<style>
  * { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); min-height: 100vh; }
  .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
  .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: white; transition: all .2s; }
  .input-field:focus { background: rgba(255,255,255,0.10); border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
  .input-field::placeholder { color: rgba(255,255,255,0.35); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .float { animation: float 4s ease-in-out infinite; }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .animate-fade-up { animation: fadeInUp .5s ease both; }
  .animate-fade-up-2 { animation: fadeInUp .5s .1s ease both; }
  .animate-fade-up-3 { animation: fadeInUp .5s .2s ease both; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<!-- Arkaplan süsleme -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-600/15 rounded-full blur-3xl"></div>
  <div class="absolute top-3/4 left-1/2 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl"></div>
</div>

<div class="w-full max-w-md relative z-10">
  <!-- Logo -->
  <div class="text-center mb-10 animate-fade-up">
    <div class="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center mx-auto mb-4 shadow-2xl shadow-indigo-900/50 float">
      <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1">local_library</span>
    </div>
    <h1 class="text-3xl font-black text-white tracking-tight">Kütüphane Zekâsı</h1>
    <p class="text-slate-400 text-sm mt-2">Kütüphane Yönetim Sistemi</p>
  </div>

  <!-- Kart -->
  <div class="glass rounded-2xl p-8 shadow-2xl animate-fade-up-2">
    <h2 class="text-white text-xl font-bold mb-1">Hoş Geldiniz</h2>
    <p class="text-slate-400 text-sm mb-8">Devam etmek için giriş yapın.</p>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">E-posta Adresi</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-[20px]">mail</span>
          <input id="login-email" type="email" placeholder="admin@kutuphane.com"
            class="input-field w-full rounded-xl py-3 pl-11 pr-4 text-sm"/>
        </div>
      </div>
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">Şifre</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-[20px]">lock</span>
          <input id="login-password" type="password" placeholder="••••••••"
            class="input-field w-full rounded-xl py-3 pl-11 pr-4 text-sm"/>
        </div>
        <div class="text-right mt-2">
          <a href="#" class="text-indigo-400 text-xs hover:text-indigo-300 transition-colors">Şifremi unuttum</a>
        </div>
      </div>

      <button id="login-btn" type="submit"
        class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-indigo-900/40 text-sm mt-2">
        <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1">login</span>
        Giriş Yap
      </button>
    </form>

    <div class="mt-6 pt-6 border-t border-white/10">
      <p class="text-slate-500 text-xs text-center mb-3">Demo Giriş Bilgileri</p>
      <div class="bg-slate-800/50 rounded-xl p-3 text-xs text-slate-400 font-mono space-y-1">
        <div><span class="text-slate-500">E-posta: </span><span class="text-indigo-300">admin@kutuphane.com</span></div>
        <div><span class="text-slate-500">Şifre: </span><span class="text-indigo-300">herhangi 3+ karakter</span></div>
      </div>
    </div>
  </div>

  <p class="text-center text-slate-600 text-xs mt-6 animate-fade-up-3">© 2024 Kütüphane Zekâsı — v1.0.0</p>
</div>

<script src="js/app.js"></script>
</body>
</html>
